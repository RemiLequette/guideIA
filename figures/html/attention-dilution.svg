<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 360" role="img">
  <title>Dilution de l'attention</title>
  <desc>Comparaison entre un contexte court où l'attention est concentrée et un contexte long où elle se disperse.</desc>

  <!-- Titre gauche -->
  <text class="th" x="160" y="36" text-anchor="middle" fill="var(--color-text-primary)">Contexte court</text>
  <!-- Titre droit -->
  <text class="th" x="510" y="36" text-anchor="middle" fill="var(--color-text-primary)">Contexte long</text>

  <!-- CAS GAUCHE : 5 blocs, 3 pertinents forts -->
  <rect x="60" y="56" width="200" height="38" rx="6" fill="#0d9488" opacity="0.85"/>
  <text class="ts" x="160" y="79" text-anchor="middle" fill="white">élément clé</text>
  <rect x="60" y="102" width="200" height="20" rx="6" fill="#d1d5db"/>
  <text class="ts" x="160" y="116" text-anchor="middle" fill="#6b7280">contexte secondaire</text>
  <rect x="60" y="130" width="200" height="36" rx="6" fill="#0d9488" opacity="0.85"/>
  <text class="ts" x="160" y="152" text-anchor="middle" fill="white">élément clé</text>
  <rect x="60" y="174" width="200" height="20" rx="6" fill="#d1d5db"/>
  <text class="ts" x="160" y="188" text-anchor="middle" fill="#6b7280">contexte secondaire</text>
  <rect x="60" y="202" width="200" height="36" rx="6" fill="#0d9488" opacity="0.85"/>
  <text class="ts" x="160" y="224" text-anchor="middle" fill="white">élément clé</text>

  <!-- Question gauche -->
  <rect x="60" y="258" width="200" height="32" rx="6" fill="#7c3aed"/>
  <text class="ts" x="160" y="278" text-anchor="middle" fill="white">question</text>

  <!-- Annotation gauche -->
  <text class="ts" x="160" y="314" text-anchor="middle" fill="#059669">attention concentrée ✓</text>

  <!-- CAS DROIT : 12 blocs, 2 pertinents noyés -->
  <rect x="400" y="56"  width="220" height="14" rx="4" fill="#d1d5db"/>
  <rect x="400" y="76"  width="220" height="14" rx="4" fill="#d1d5db"/>
  <rect x="400" y="96"  width="220" height="14" rx="4" fill="#d1d5db"/>
  <rect x="400" y="116" width="220" height="18" rx="4" fill="#0d9488" opacity="0.45"/>
  <text class="ts" x="510" y="129" text-anchor="middle" fill="#065f46">élément clé</text>
  <rect x="400" y="140" width="220" height="14" rx="4" fill="#d1d5db"/>
  <rect x="400" y="160" width="220" height="14" rx="4" fill="#d1d5db"/>
  <rect x="400" y="180" width="220" height="14" rx="4" fill="#d1d5db"/>
  <rect x="400" y="200" width="220" height="18" rx="4" fill="#0d9488" opacity="0.45"/>
  <text class="ts" x="510" y="213" text-anchor="middle" fill="#065f46">élément clé</text>
  <rect x="400" y="224" width="220" height="14" rx="4" fill="#d1d5db"/>
  <rect x="400" y="244" width="220" height="14" rx="4" fill="#d1d5db"/>

  <!-- Question droite -->
  <rect x="400" y="264" width="220" height="32" rx="6" fill="#7c3aed"/>
  <text class="ts" x="510" y="284" text-anchor="middle" fill="white">question</text>

  <!-- Annotation droite -->
  <text class="ts" x="510" y="314" text-anchor="middle" fill="#ef4444">attention diluée ✗</text>

  <!-- Séparateur central -->
  <line x1="340" y1="50" x2="340" y2="330" stroke="#e5e7eb" stroke-width="1.5"/>

</svg>
