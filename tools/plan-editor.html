<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Editor — guideIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'DM Sans', -apple-system, sans-serif;
  font-size: 13px;
  background: #e8e6e0;
  color: #111;
  overflow: hidden;
}
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Topbar ── */
#topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 0 14px; height: 44px;
  background: #171614; flex-shrink: 0;
}
#topbar h1 {
  font-family: 'DM Mono', monospace;
  font-size: 11px; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  color: #fff; margin-right: 4px;
}
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: background .3s; }
.dot-green  { background: #16a34a; }
.dot-orange { background: #ea580c; }
.dot-red    { background: #dc2626; }
#status-text { font-family: 'DM Mono', monospace; font-size: 10px; color: #666; }
#badge-revision {
  font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 10px;
  background: #78350f; color: #fde68a; font-size: 10px; font-weight: 500;
  border: 1px solid #92400e; display: none;
}
#badge-renumber {
  font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 10px;
  background: #1e3a5f; color: #bfdbfe; font-size: 10px; font-weight: 500;
  border: 1px solid #1e40af; display: none;
}
.spacer { flex: 1; }
.btn-top {
  font-family: 'DM Sans', sans-serif;
  padding: 4px 10px; border-radius: 5px; border: none; cursor: pointer;
  font-size: 11px; font-weight: 600; transition: all .15s;
}
#btn-refresh { background: transparent; color: #aaa; border: 1px solid #444; }
#btn-refresh:hover { color: #fff; border-color: #666; }
#btn-save { background: #16a34a; color: #fff; }
#btn-save:hover { background: #15803d; }
#btn-save:disabled, #btn-refresh:disabled { opacity: 0.35; cursor: default; }

/* ── Corps ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Navigateur ── */
#nav {
  width: 230px; flex-shrink: 0;
  background: #f5f3ed;
  border-right: 1px solid #d6d2c8;
  display: flex; flex-direction: column;
}
#nav-head {
  padding: 8px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase;
  color: #888; border-bottom: 1px solid #d6d2c8;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
#chapter-list { flex: 1; overflow-y: auto; padding: 4px 0; }

.ch-item {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 8px 6px 0; cursor: pointer;
  border-left: 3px solid transparent; transition: background .1s;
}
.ch-item:hover  { background: #ece9e1; }
.ch-item.active { background: #fff; border-left-color: #2563eb; }
.ch-item.meta-item { border-left-color: transparent; }
.ch-item.meta-item.active { border-left-color: #7c3aed; }

.ch-num {
  font-family: 'DM Mono', monospace; font-size: 11px;
  min-width: 28px; text-align: right; color: #aaa; padding-left: 6px;
}
.ch-item.active .ch-num { color: #2563eb; font-weight: 500; }
.ch-item.meta-item.active .ch-num { color: #7c3aed; }

.ch-title {
  flex: 1; font-size: 12px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #444;
}
.ch-item.active .ch-title { color: #111; font-weight: 500; }

.ch-badges { display: flex; gap: 2px; align-items: center; }
.badge {
  font-family: 'DM Mono', monospace; font-size: 9px; padding: 1px 5px;
  border-radius: 8px; font-weight: 700; white-space: nowrap; line-height: 1.5;
}
.b-ok   { background: #dcfce7; color: #166534; }
.b-warn { background: #fef9c3; color: #854d0e; }
.b-only { background: #dbeafe; color: #1e40af; }
.b-mod  { background: #fae8ff; color: #7e22ce; }
.b-meta { background: #ede9fe; color: #6d28d9; }

.nav-sep { height: 1px; background: #d6d2c8; margin: 4px 0; }

#nav-foot {
  padding: 6px 10px; font-family: 'DM Mono', monospace;
  font-size: 10px; color: #aaa; border-top: 1px solid #d6d2c8; flex-shrink: 0;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c8c4bc; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #aaa; }

/* ── Zone détail ── */
#detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #e8e6e0; }

#ch-header {
  padding: 7px 14px; background: #f5f3ed;
  border-bottom: 1px solid #d6d2c8;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
#ch-title { font-size: 14px; font-weight: 600; color: #111; }
#ch-sync  { font-family: 'DM Mono', monospace; font-size: 10px; color: #888; }

#row-top { flex: 1; display: flex; overflow: hidden; min-height: 0; border-bottom: 2px solid #d6d2c8; }

.editor-pane {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  border-right: 1px solid #d6d2c8; background: #fff;
}
.editor-pane:last-child { border-right: none; }

.pane-head {
  display: flex; align-items: center; gap: 6px; padding: 5px 10px;
  background: #f5f3ed; border-bottom: 1px solid #d6d2c8; flex-shrink: 0;
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: #888;
}
.pane-label-plan  { color: #2563eb; }
.pane-label-guide { color: #16a34a; }
.pane-label-meta  { color: #7c3aed; }
.pane-modified { color: #ea580c; font-weight: 700; }
.pane-actions { margin-left: auto; display: flex; gap: 4px; }
.btn-pane {
  font-family: 'DM Sans', sans-serif;
  padding: 2px 8px; border-radius: 3px; border: none; cursor: pointer;
  font-size: 10px; font-weight: 600; transition: background .15s;
}
.btn-apply  { background: #dbeafe; color: #1e40af; }
.btn-apply:hover  { background: #bfdbfe; }
.btn-cancel { background: #f3f4f6; color: #6b7280; border: 0.5px solid #e5e7eb; }
.btn-cancel:hover { background: #e5e7eb; }

textarea.editor {
  flex: 1; resize: none; border: none; outline: none; padding: 12px 14px;
  background: #fff; color: #374151;
  font-family: 'DM Mono', monospace; font-size: 11.5px; line-height: 1.75; tab-size: 2;
}
textarea.editor.modified { background: #fffbeb; }
textarea.editor:focus { background: #fefefe; }
textarea.editor.modified:focus { background: #fefce8; }
textarea.editor:disabled { background: #f5f3ed; color: #aaa; cursor: default; }

/* ── Rangée basse : Éléments ── */
#row-bottom {
  height: 180px; flex-shrink: 0; overflow: hidden;
  display: flex; flex-direction: column;
  background: #f5f3ed; border-top: 1px solid #d6d2c8;
}
#elem-head {
  padding: 5px 12px; border-bottom: 1px solid #d6d2c8;
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: #888;
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
#elem-head span { color: #2563eb; }
#elem-body { flex: 1; overflow-x: auto; overflow-y: auto; display: flex; }

.elem-col {
  flex: 1; min-width: 180px; border-right: 1px solid #d6d2c8;
  display: flex; flex-direction: column; overflow: hidden;
}
.elem-col:last-child { border-right: none; }
.elem-col-head {
  padding: 3px 10px; font-family: 'DM Mono', monospace;
  font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em;
  color: #aaa; background: #eceae2; border-bottom: 1px solid #d6d2c8; flex-shrink: 0;
}
.elem-col-body { flex: 1; overflow-y: auto; padding: 3px 6px; }

.elem-row {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 5px; border-radius: 3px; margin-bottom: 1px; font-size: 11px;
}
.elem-row:hover { background: #ece9e1; }
.elem-row.clickable { cursor: pointer; }
.elem-id {
  font-family: 'DM Mono', monospace; color: #2563eb; font-size: 10px;
  font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.elem-del { background: none; border: none; color: #d1d5db; cursor: pointer; font-size: 12px; padding: 0 2px; opacity: 0; }
.elem-row:hover .elem-del { opacity: 1; color: #dc2626; }
.elem-add {
  padding: 3px 8px; margin: 4px 6px; border: 1px dashed #d6d2c8;
  border-radius: 4px; background: none; color: #aaa; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 10px; text-align: left;
  width: calc(100% - 12px); transition: border-color .15s, color .15s;
}
.elem-add:hover { border-color: #2563eb; color: #2563eb; }

/* ── Empty state ── */
#empty-state {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 8px; color: #aaa;
}
#empty-state p { font-size: 15px; }
#empty-state small { font-size: 12px; }

/* ── Modal ── */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal {
  background: #f5f3ed; border: 1px solid #d6d2c8; border-radius: 10px;
  padding: 22px; width: 520px; max-width: 95vw; max-height: 80vh;
  overflow-y: auto; box-shadow: 0 16px 50px rgba(0,0,0,.2);
}
#modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #111; }
#modal label {
  display: block; font-family: 'DM Mono', monospace;
  font-size: 10px; color: #888; margin: 10px 0 4px;
  text-transform: uppercase; letter-spacing: .06em;
}
#modal input, #modal textarea, #modal select {
  width: 100%; background: #fff; border: 1px solid #d6d2c8;
  border-radius: 5px; padding: 7px 10px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; color: #111; outline: none;
}
#modal input:focus, #modal textarea:focus { border-color: #2563eb; }
#modal textarea { height: 140px; resize: vertical; font-family: 'DM Mono', monospace; font-size: 11px; line-height: 1.6; }
#modal p { color: #666; font-size: 13px; line-height: 1.6; }
.modal-check {
  display: flex; align-items: flex-start; gap: 8px;
  margin-top: 10px; padding: 8px 10px;
  background: #fefce8; border: 1px solid #fde68a; border-radius: 6px;
  font-size: 12px; color: #854d0e; line-height: 1.5; cursor: pointer;
}
.modal-check input[type=checkbox] { margin-top: 2px; flex-shrink: 0; cursor: pointer; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.btn-primary {
  font-family: 'DM Sans', sans-serif; padding: 7px 18px; background: #171614; color: #fff;
  border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; transition: background .15s;
}
.btn-primary:hover { background: #333; }
.btn-secondary {
  font-family: 'DM Sans', sans-serif; padding: 7px 18px; background: transparent; color: #888;
  border: 1px solid #d6d2c8; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background .15s;
}
.btn-secondary:hover { background: #e2dfd7; color: #111; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 18px; right: 18px;
  background: #171614; color: #f5f3ed; border: 1px solid #333;
  padding: 8px 14px; border-radius: 6px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 200;
}
#toast.show { opacity: 1; }
#toast.err  { background: #fef2f2; border-color: #fca5a5; color: #b91c1c; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>Plan Editor</h1>
    <span class="dot dot-orange" id="conn-dot"></span>
    <span id="status-text">Connexion…</span>
    <span id="badge-revision">● révision en cours</span>
    <span id="badge-renumber">↺ renuméroté</span>
    <span class="spacer"></span>
    <button class="btn-top" id="btn-refresh">↺ Rafraîchir</button>
    <button class="btn-top" id="btn-save" disabled>💾 Enregistrer</button>
  </div>

  <div id="main">
    <div id="nav">
      <div id="nav-head">Chapitres</div>
      <div id="chapter-list"></div>
      <div id="nav-foot"></div>
    </div>

    <div id="detail">
      <div id="empty-state">
        <p>Sélectionnez un chapitre</p>
        <small>Chargement en cours…</small>
      </div>

      <div id="chapter-view" style="display:none; flex-direction:column; height:100%; overflow:hidden;">
        <div id="ch-header">
          <span id="ch-title"></span>
          <span id="ch-sync"></span>
        </div>

        <div id="row-top">
          <div class="editor-pane" id="pane-plan">
            <div class="pane-head">
              <span id="pane-plan-label" class="pane-label-plan">📋 Plan.md</span>
              <span id="plan-mod" class="pane-modified" style="display:none">● modifié</span>
              <div class="pane-actions">
                <button class="btn-pane btn-cancel" id="btn-cancel-plan">Annuler</button>
                <button class="btn-pane btn-apply"  id="btn-apply-plan">Appliquer</button>
              </div>
            </div>
            <textarea class="editor" id="editor-plan" placeholder="Contenu attendu du chapitre dans le plan…"></textarea>
          </div>

          <div class="editor-pane" id="pane-guide">
            <div class="pane-head">
              <span class="pane-label-guide">📖 GuideIA.md</span>
              <span id="guide-mod" class="pane-modified" style="display:none">● modifié</span>
              <div class="pane-actions">
                <button class="btn-pane btn-cancel" id="btn-cancel-guide">Annuler</button>
                <button class="btn-pane btn-apply"  id="btn-apply-guide">Appliquer</button>
              </div>
            </div>
            <textarea class="editor" id="editor-guide" placeholder="Texte rédigé dans le guide…"></textarea>
          </div>
        </div>

        <div id="row-bottom">
          <div id="elem-head">Éléments — <span id="elem-ch-title"></span></div>
          <div id="elem-body">
            <div class="elem-col">
              <div class="elem-col-head">🏷 Mots-clés</div>
              <div class="elem-col-body" id="list-keywords"></div>
              <button class="elem-add" id="btn-add-keyword">+ Ajouter</button>
            </div>
            <div class="elem-col">
              <div class="elem-col-head">🖼 Figures</div>
              <div class="elem-col-body" id="list-figures"></div>
              <button class="elem-add" id="btn-add-figure">+ Ajouter</button>
            </div>
            <div class="elem-col">
              <div class="elem-col-head">📦 Encadrés</div>
              <div class="elem-col-body" id="list-encadres"></div>
              <button class="elem-add" id="btn-add-encadre">+ Ajouter</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="modal-cancel">Annuler</button>
      <button class="btn-primary"   id="modal-confirm">Confirmer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="lib/guide-parser.js"></script>
<script>
'use strict';

const META_KEY = '__meta__';

const BASE = (() => {
  const p = window.location.pathname.replace(/^\//, '').replace(/[^/\\]+$/, '');
  return p.endsWith('/') || p.endsWith('\\') ? p : p + '/';
})();
const PROJECT = BASE.replace(/tools[/\\]$/, '');
const PATH = {
  plan:  PROJECT + 'Plan.md',
  guide: PROJECT + 'GuideIA.md',
  draft: BASE    + 'plan-editor-draft.json',
};

const S = {
  connected:    false,
  planText:     '',
  guideText:    '',
  chapters:     [],
  metaContent:  '',
  metaModified: false,
  draft:        null,
  selected:     null,
  edits:        {},
};

const api = {
  async get(path) {
    const r = await fetch(`/file?path=${encodeURIComponent(path)}`);
    if (!r.ok) throw new Error(`GET ${path} → ${r.status}`);
    return r.text();
  },
  async post(path, body) {
    const r = await fetch(`/file?path=${encodeURIComponent(path)}`, {
      method: 'POST', headers: {'Content-Type': 'text/plain'}, body,
    });
    if (!r.ok) throw new Error(`POST ${path} → ${r.status}`);
  },
  async del(path) {
    await fetch(`/file?path=${encodeURIComponent(path)}`, { method: 'DELETE' }).catch(() => {});
  },
  async ping() {
    try { return (await fetch('/ping')).ok; } catch { return false; }
  },
};

const { parsePlan, parseGuide } = GuideParser;

function extractMeta(planText) {
  const lines = planText.split('\n');
  for (let i = 0; i < lines.length; i++) {
    if (/^\s*<!--/.test(lines[i])) {
      for (let j = i; j < Math.min(i + 15, lines.length); j++) {
        if (/CONTENU/i.test(lines[j])) return lines.slice(0, i).join('\n').trimEnd();
        if (/-->/.test(lines[j])) break;
      }
    }
  }
  return '';
}

function buildState(planText, guideText, draft) {
  const planChs  = parsePlan(planText);
  const guideChs = parseGuide(guideText);
  const planNums  = new Set(planChs.map(c => c.num));
  const guideNums = new Set(Object.keys(guideChs));
  const allNums   = [...new Set([...planNums, ...guideNums])].sort((a,b) => +a - +b);

  const chapters = allNums.map(num => {
    const p = planChs.find(c => c.num === num);
    const g = guideChs[num];
    const syncStatus = !p ? 'guide-only' : !g ? 'plan-only' : 'ok';
    const declaredIds = p ? [...p.keywords, ...(p.figures||[]).map(f=>f.id), ...(p.encadres||[]).map(e=>e.id)] : [];
    const definedIds  = g ? g.defs : [];
    const missingDefs = declaredIds.filter(id => !definedIds.includes(id));
    return {
      num, title: p ? p.title : '[guide seulement]',
      planContent:  p ? p.planContent : '',
      guideContent: g ? g.content    : '',
      keywords: p ? p.keywords : [],
      figures:  p ? p.figures  : [],
      encadres: p ? p.encadres : [],
      defs: g ? g.defs : [],
      refs: g ? g.refs : [],
      syncStatus, missingDefs,
    };
  });

  const edits = {};
  chapters.forEach(ch => {
    edits[ch.num] = {
      planContent:  ch.planContent,
      guideContent: ch.guideContent,
      keywords:     [...ch.keywords],
      figures:      ch.figures.map(f => ({...f})),
      encadres:     ch.encadres.map(e => ({...e})),
      planModified:  false,
      guideModified: false,
    };
  });

  if (draft && draft.ops) {
    draft.ops.forEach(op => replayOp(op, chapters, edits));
  }

  return { chapters, edits };
}

function replayOp(op, chapters, edits) {
  if (op.type === 'edit-meta-content') {
    S.metaContent  = op.content;
    S.metaModified = true;
    return;
  }
  const edit = edits[op.chapter];
  switch (op.type) {
    case 'edit-plan-content':
      if (edit) { edit.planContent = op.content; edit.planModified = true; } break;
    case 'edit-guide-content':
      if (edit) { edit.guideContent = op.content; edit.guideModified = true; } break;
    case 'edit-element-content': {
      if (!edit) break;
      const arr = op.elType === 'figures' ? edit.figures : edit.encadres;
      const el = arr.find(x => x.id === op.id);
      if (el) {
        if (op.elType === 'figures')  el.caption = op.content;
        if (op.elType === 'encadres') el.desc    = op.content;
      }
      break;
    }
    case 'add-element':
      if (edit) {
        const arr = op.elType === 'keywords' ? edit.keywords : op.elType === 'figures' ? edit.figures : edit.encadres;
        if (!arr.find(x => (x.id||x) === op.id))
          arr.push(op.elType === 'keywords' ? op.id : { id: op.id });
      } break;
    case 'remove-element':
      if (edit) {
        edit.keywords = edit.keywords.filter(k => k !== op.id);
        edit.figures  = edit.figures.filter(f => f.id !== op.id);
        edit.encadres = edit.encadres.filter(e => e.id !== op.id);
      } break;
  }
}

function applyDisplayNums() {
  S.chapters.forEach((ch, idx) => { ch.displayNum = String(idx + 1); });
}

function addOp(op) {
  if (!S.draft) S.draft = { ops: [] };
  if (op.type === 'edit-meta-content')
    S.draft.ops = S.draft.ops.filter(o => o.type !== 'edit-meta-content');
  if (op.type === 'edit-plan-content' || op.type === 'edit-guide-content')
    S.draft.ops = S.draft.ops.filter(o => !(o.type === op.type && o.chapter === op.chapter));
  if (op.type === 'edit-element-content')
    S.draft.ops = S.draft.ops.filter(o => !(o.type === op.type && o.chapter === op.chapter && o.elType === op.elType && o.id === op.id));
  S.draft.ops.push(op);
  api.post(PATH.draft, JSON.stringify(S.draft, null, 2)).catch(console.error);
  updateTopbar();
}

function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function computeRenumber() {
  const mapping = {};
  S.chapters.forEach((ch, idx) => { mapping[ch.num] = String(idx + 1); });
  return mapping;
}

function renumberPlanText(text, mapping) {
  let r = text;
  Object.entries(mapping).sort((a,b)=>+b[0]-+a[0]).forEach(([o,n]) => {
    if (o !== n) r = r.replace(new RegExp(`^(### +)${escRe(o)}([.\\-\\s])`, 'gm'), `$1${n}$2`);
  });
  return r;
}

function renumberGuideText(text, mapping) {
  let r = text;
  Object.entries(mapping).sort((a,b)=>+b[0]-+a[0]).forEach(([o,n]) => {
    if (o !== n) r = r.replace(new RegExp(`^(## +)${escRe(o)}([.\\-\\s])`, 'gm'), `$1${n}$2`);
  });
  return r;
}

function renumberPlanChapterList(text, mapping) {
  return text.replace(/(## Chapitres[\s\S]*?)(?=\n## |\n<!-- )/, s =>
    s.replace(/^(\d+)\. /gm, (_, n) => `${mapping[n]||n}. `)
  );
}

async function autoRenumber(planText, guideText) {
  const mapping = computeRenumber();
  const needsRenumber = Object.entries(mapping).some(([o, n]) => o !== n);
  if (!needsRenumber) return { planText, guideText, changed: false };

  let newPlan  = renumberPlanText(planText, mapping);
  newPlan      = renumberPlanChapterList(newPlan, mapping);
  const newGuide = renumberGuideText(guideText, mapping);

  try {
    await api.post(PATH.plan,  newPlan);
    await api.post(PATH.guide, newGuide);
    return { planText: newPlan, guideText: newGuide, changed: true };
  } catch(e) {
    toast('Erreur renumérotation : ' + e.message, true);
    return { planText, guideText, changed: false };
  }
}

function renderNav() {
  const list = document.getElementById('chapter-list');
  list.innerHTML = '';

  const metaItem = document.createElement('div');
  metaItem.className = 'ch-item meta-item' + (S.selected === META_KEY ? ' active' : '');
  metaItem.innerHTML = `
    <span class="ch-num" style="color:#7c3aed;font-size:10px">✦</span>
    <span class="ch-title">Méta-données</span>
    <span class="ch-badges">${S.metaModified ? '<span class="badge b-mod" title="Modifications en attente">✎</span>' : '<span class="badge b-meta">méta</span>'}</span>`;
  metaItem.onclick = () => selectCh(META_KEY);
  list.appendChild(metaItem);

  const sep = document.createElement('div');
  sep.className = 'nav-sep';
  list.appendChild(sep);

  S.chapters.forEach(ch => {
    const edit = S.edits[ch.num] || {};
    const modified = edit.planModified || edit.guideModified;
    const displayNum = ch.displayNum || ch.num;

    const item = document.createElement('div');
    item.className = 'ch-item' + (ch.num === S.selected ? ' active' : '');

    const num    = document.createElement('span'); num.className = 'ch-num'; num.textContent = displayNum;
    const title  = document.createElement('span'); title.className = 'ch-title'; title.textContent = ch.title;
    const badges = document.createElement('span'); badges.className = 'ch-badges';

    if      (ch.syncStatus === 'plan-only')  badges.innerHTML = `<span class="badge b-only" title="Uniquement dans Plan.md">plan</span>`;
    else if (ch.syncStatus === 'guide-only') badges.innerHTML = `<span class="badge b-only" title="Uniquement dans GuideIA.md">guide</span>`;
    else if (ch.missingDefs.length)          badges.innerHTML = `<span class="badge b-warn" title="${ch.missingDefs.length} élément(s) sans {{def}}">⚠${ch.missingDefs.length}</span>`;
    else                                     badges.innerHTML = `<span class="badge b-ok" title="Synchronisé">✓</span>`;
    if (modified) badges.innerHTML += `<span class="badge b-mod" title="Modifications en attente">✎</span>`;

    item.append(num, title, badges);
    item.onclick = () => selectCh(ch.num);
    list.appendChild(item);
  });

  const total  = S.chapters.length;
  const issues = S.chapters.filter(c => c.missingDefs.length || c.syncStatus !== 'ok').length;
  document.getElementById('nav-foot').textContent =
    `${total} chapitre${total>1?'s':''} · ${issues ? issues+' problème(s)' : 'tout OK'}`;
}

function selectCh(num) {
  S.selected = num; renderNav(); renderDetail();
}

function renderDetail() {
  const isMeta = (S.selected === META_KEY);
  const ch = isMeta ? null : S.chapters.find(c => c.num === S.selected);
  const hasSelection = isMeta || !!ch;

  document.getElementById('empty-state').style.display  = hasSelection ? 'none' : 'flex';
  document.getElementById('chapter-view').style.display = hasSelection ? 'flex' : 'none';
  if (!hasSelection) return;

  if (isMeta) { renderMetaDetail(); return; }

  const edit = S.edits[ch.num] || {};
  const displayNum = ch.displayNum || ch.num;

  document.getElementById('ch-title').textContent = `${displayNum}. ${ch.title}`;
  const syncEl = document.getElementById('ch-sync');
  if      (ch.syncStatus === 'plan-only')  syncEl.textContent = '⚠ plan seulement';
  else if (ch.syncStatus === 'guide-only') syncEl.textContent = '⚠ guide seulement';
  else if (ch.missingDefs.length)          syncEl.textContent = `⚠ ${ch.missingDefs.length} balise(s) sans {{def}}`;
  else                                     syncEl.textContent = '✓ synchronisé';

  document.getElementById('pane-plan-label').textContent = '📋 Plan.md';
  document.getElementById('pane-plan-label').className   = 'pane-label-plan';
  document.getElementById('row-bottom').style.display = 'flex';

  const ePlan  = document.getElementById('editor-plan');
  const eGuide = document.getElementById('editor-guide');
  ePlan.disabled  = false;
  eGuide.disabled = false;
  ePlan.value  = edit.planContent  || '';
  eGuide.value = edit.guideContent || '';
  ePlan.placeholder  = 'Contenu attendu du chapitre dans le plan…';
  eGuide.placeholder = 'Texte rédigé dans le guide…';
  ePlan.classList.toggle('modified',  edit.planModified  || false);
  eGuide.classList.toggle('modified', edit.guideModified || false);
  document.getElementById('plan-mod').style.display  = edit.planModified  ? 'inline' : 'none';
  document.getElementById('guide-mod').style.display = edit.guideModified ? 'inline' : 'none';

  document.getElementById('elem-ch-title').textContent = `ch. ${displayNum} — ${ch.title}`;
  renderElemList('keywords', edit.keywords || [], ch.defs);
  renderElemList('figures',  edit.figures  || [], ch.defs);
  renderElemList('encadres', edit.encadres || [], ch.defs);
}

function renderMetaDetail() {
  document.getElementById('ch-title').textContent = 'Méta-données';
  document.getElementById('ch-sync').textContent  = 'Plan.md — section avant le délimiteur CONTENU';
  document.getElementById('pane-plan-label').textContent = '✦ Méta-données Plan.md';
  document.getElementById('pane-plan-label').className   = 'pane-label-meta';
  document.getElementById('row-bottom').style.display = 'none';

  const ePlan  = document.getElementById('editor-plan');
  const eGuide = document.getElementById('editor-guide');
  ePlan.disabled  = false;
  eGuide.disabled = true;
  ePlan.value  = S.metaContent;
  eGuide.value = '';
  ePlan.placeholder  = 'Méta-données du plan…';
  eGuide.placeholder = 'Les méta-données n\'ont pas d\'équivalent dans le guide.';
  ePlan.classList.toggle('modified', S.metaModified);
  eGuide.classList.remove('modified');
  document.getElementById('plan-mod').style.display  = S.metaModified ? 'inline' : 'none';
  document.getElementById('guide-mod').style.display = 'none';
}

function renderElemList(type, items, definedIds) {
  const container = document.getElementById('list-' + type);
  container.innerHTML = '';
  const isRich = (type === 'figures' || type === 'encadres');
  items.forEach(item => {
    const id = typeof item === 'string' ? item : item.id;
    const row = document.createElement('div');
    row.className = 'elem-row' + (isRich ? ' clickable' : '');
    const isDef = definedIds.includes(id);
    row.innerHTML = `
      <span class="badge ${isDef ? 'b-ok' : 'b-warn'}" title="${isDef ? 'Défini dans le guide' : 'Non défini'}">${isDef ? '✓' : '○'}</span>
      <span class="elem-id">${id}</span>
      <button class="elem-del" title="Supprimer">×</button>`;
    if (isRich) {
      row.addEventListener('click', e => {
        if (e.target.classList.contains('elem-del')) return;
        editElementContent(type, item);
      });
    }
    row.querySelector('.elem-del').onclick = e => { e.stopPropagation(); deleteElem(type, id); };
    container.appendChild(row);
  });
}

function editElementContent(type, item) {
  const num = S.selected; if (!num || num === META_KEY) return;
  const id = item.id;
  const isFig = (type === 'figures');
  const label = isFig ? 'figure' : 'encadré';
  const currentContent = isFig ? (item.caption || '') : (item.desc || '');
  const fieldLabel = isFig ? 'Légende / description' : 'Description';

  showModal(`Éditer ${label} — ${id}`, `
    <label>Identifiant</label>
    <input value="${id}" disabled style="opacity:0.5; cursor:default;" />
    <label>${fieldLabel}</label>
    <textarea id="m-elem-content" style="height:160px">${currentContent}</textarea>
  `, () => {
    const content = document.getElementById('m-elem-content').value;
    addOp({ type: 'edit-element-content', chapter: num, elType: type, id, content });
    const edit = S.edits[num];
    if (edit) {
      const arr = type === 'figures' ? edit.figures : edit.encadres;
      const el = arr.find(x => x.id === id);
      if (el) { if (isFig) el.caption = content; else el.desc = content; }
    }
    if (isFig) item.caption = content; else item.desc = content;
    toast(`${label} mis à jour`);
    return true;
  });
}

function applyPlan() {
  if (S.selected === META_KEY) {
    const content = document.getElementById('editor-plan').value;
    addOp({ type: 'edit-meta-content', content });
    S.metaContent  = content;
    S.metaModified = true;
    renderNav(); renderMetaDetail();
    toast('Méta — enregistré dans la révision');
    return;
  }
  const num = S.selected; if (!num) return;
  const content = document.getElementById('editor-plan').value;
  addOp({ type: 'edit-plan-content', chapter: num, content });
  if (S.edits[num]) { S.edits[num].planContent = content; S.edits[num].planModified = true; }
  renderNav(); renderDetail();
  toast('Plan — enregistré dans la révision');
}

function cancelPlan() {
  if (S.selected === META_KEY) {
    document.getElementById('editor-plan').value = S.metaContent;
    document.getElementById('editor-plan').classList.toggle('modified', S.metaModified);
    return;
  }
  const ch = S.chapters.find(c => c.num === S.selected);
  if (ch) {
    document.getElementById('editor-plan').value = ch.planContent;
    document.getElementById('editor-plan').classList.remove('modified');
    document.getElementById('plan-mod').style.display = 'none';
  }
}

function applyGuide() {
  const num = S.selected; if (!num || num === META_KEY) return;
  const content = document.getElementById('editor-guide').value;
  addOp({ type: 'edit-guide-content', chapter: num, content });
  if (S.edits[num]) { S.edits[num].guideContent = content; S.edits[num].guideModified = true; }
  renderNav(); renderDetail();
  toast('Guide — enregistré dans la révision');
}

function cancelGuide() {
  const ch = S.chapters.find(c => c.num === S.selected);
  if (ch) {
    document.getElementById('editor-guide').value = ch.guideContent;
    document.getElementById('editor-guide').classList.remove('modified');
    document.getElementById('guide-mod').style.display = 'none';
  }
}

function getPendingTextareas() {
  const pending = [];
  if (S.selected === META_KEY) {
    if (document.getElementById('editor-plan').value !== S.metaContent)
      pending.push({ pane: 'Méta', num: META_KEY, side: 'meta' });
    return pending;
  }
  const ch = S.chapters.find(c => c.num === S.selected);
  if (!ch) return pending;
  const edit = S.edits[ch.num] || {};
  const ePlan  = document.getElementById('editor-plan');
  const eGuide = document.getElementById('editor-guide');
  if (ePlan.value  !== (edit.planContent  || '')) pending.push({ pane: 'Plan',  num: ch.num, side: 'plan' });
  if (eGuide.value !== (edit.guideContent || '')) pending.push({ pane: 'Guide', num: ch.num, side: 'guide' });
  return pending;
}

function deleteElem(type, id) {
  const num = S.selected; if (!num || num === META_KEY) return;
  addOp({ type: 'remove-element', chapter: num, elType: type, id });
  const edit = S.edits[num];
  if (edit) {
    if (type === 'keywords') edit.keywords = edit.keywords.filter(k => k !== id);
    if (type === 'figures')  edit.figures  = edit.figures.filter(f => f.id !== id);
    if (type === 'encadres') edit.encadres = edit.encadres.filter(e => e.id !== id);
  }
  renderDetail(); renderNav();
  toast('Élément supprimé');
}

function promptAddElem(type) {
  const num = S.selected; if (!num || num === META_KEY) return;
  const labels = { keywords: 'mot-clé', figures: 'figure', encadres: 'encadré' };
  showModal(`Ajouter un ${labels[type]}`, `
    <label>Identifiant</label>
    <input id="m-id" placeholder="ex: hallucination" autocomplete="off" />
  `, () => {
    const id = document.getElementById('m-id').value.trim();
    if (!id) { toast('Identifiant requis', true); return false; }
    addOp({ type: 'add-element', chapter: num, elType: type, id });
    const edit = S.edits[num];
    if (edit) {
      if (type === 'keywords') edit.keywords.push(id);
      if (type === 'figures')  edit.figures.push({ id, caption: '' });
      if (type === 'encadres') edit.encadres.push({ id, desc: '' });
    }
    renderDetail(); renderNav();
    toast(`${labels[type]} ajouté`);
    return true;
  });
}

async function save() {
  if (!S.draft || !S.draft.ops.length) { toast('Aucune modification à enregistrer'); return; }

  const today = new Date().toISOString().slice(0,10);
  const summary = [...new Set(S.draft.ops.map(op => {
    if (op.type === 'edit-meta-content')    return 'Méta-données modifiées';
    if (op.type === 'edit-plan-content')    return `Contenu plan ch.${op.chapter} modifié`;
    if (op.type === 'edit-guide-content')   return `Contenu guide ch.${op.chapter} modifié`;
    if (op.type === 'edit-element-content') return `${op.elType === 'figures' ? 'Figure' : 'Encadré'} "${op.id}" modifié (ch.${op.chapter})`;
    if (op.type === 'add-element')          return `Élément "${op.id}" ajouté (ch.${op.chapter})`;
    if (op.type === 'remove-element')       return `Élément "${op.id}" supprimé (ch.${op.chapter})`;
    return op.type;
  }))].join('\n- ');

  const pending = getPendingTextareas();
  const pendingHtml = pending.length > 0 ? `
    <label style="margin-top:14px">Modifications non appliquées</label>
    <label class="modal-check">
      <input type="checkbox" id="chk-pending" checked />
      Inclure les modifications non appliquées :
      ${pending.map(p => `<strong>${p.pane}${p.num !== META_KEY ? ' ch.'+p.num : ''}</strong>`).join(', ')}
    </label>` : '';

  showModal('Confirmer l\'enregistrement', `
    <p style="margin-bottom:10px">Modifications appliquées à <strong>Plan.md</strong> et <strong>GuideIA.md</strong>.</p>
    <label>Entrée Changelog</label>
    <textarea id="m-cl">\n### Révision ${today}\n- ${summary}</textarea>
    ${pendingHtml}
  `, async () => {
    try {
      const cl = document.getElementById('m-cl').value;
      const chkEl = document.getElementById('chk-pending');
      const includePending = pending.length > 0 && chkEl && chkEl.checked;

      if (includePending) {
        for (const p of pending) {
          if (p.side === 'meta') {
            const content = document.getElementById('editor-plan').value;
            addOp({ type: 'edit-meta-content', content });
            S.metaContent = content; S.metaModified = true;
          } else {
            const content = document.getElementById(p.side === 'plan' ? 'editor-plan' : 'editor-guide').value;
            addOp({ type: p.side === 'plan' ? 'edit-plan-content' : 'edit-guide-content', chapter: p.num, content });
            if (S.edits[p.num]) {
              if (p.side === 'plan')  { S.edits[p.num].planContent  = content; S.edits[p.num].planModified  = true; }
              if (p.side === 'guide') { S.edits[p.num].guideContent = content; S.edits[p.num].guideModified = true; }
            }
          }
        }
      }

      let planText  = S.planText;
      let guideText = S.guideText;

      for (const op of S.draft.ops) {
        if (op.type === 'edit-meta-content')    planText  = replaceMetaContent(planText, op.content);
        if (op.type === 'edit-plan-content')    planText  = replacePlanContent(planText,  op.chapter, op.content);
        if (op.type === 'edit-guide-content')   guideText = replaceGuideContent(guideText, op.chapter, op.content);
        if (op.type === 'edit-element-content') planText  = replaceElementContent(planText, op.chapter, op.elType, op.id, op.content);
      }

      if (cl.trim()) { planText += '\n' + cl; guideText += '\n' + cl; }
      await api.post(PATH.plan,  planText);
      await api.post(PATH.guide, guideText);
      await api.del(PATH.draft);
      S.draft = null;
      await load();
      toast('✓ Enregistré');
      return true;
    } catch(e) { toast('Erreur : ' + e.message, true); return false; }
  });
}

// ── Fonctions de remplacement ──

/**
 * Localise la ligne d'ouverture <!-- du bloc délimiteur CONTENU.
 */
function findDelimiterLine(lines) {
  for (let i = 0; i < lines.length; i++) {
    if (/^\s*<!--/.test(lines[i])) {
      for (let j = i; j < Math.min(i + 15, lines.length); j++) {
        if (/CONTENU/i.test(lines[j])) return i;
        if (/-->/.test(lines[j])) break;
      }
    }
  }
  return -1;
}

function replaceMetaContent(text, content) {
  const lines = text.split('\n');
  const delimIdx = findDelimiterLine(lines);
  if (delimIdx === -1) return text;
  return [...content.split('\n'), '', ...lines.slice(delimIdx)].join('\n');
}

/**
 * Plan.md — remplace la section #### Contenu du chapitre num.
 * Chapitres en ### N. (trois dièses), sous-sections en #### (quatre dièses).
 * Correction clé : /^###[^#]/ pour ne pas confondre ### et ####.
 */
function replacePlanContent(text, num, content) {
  const lines = text.split('\n');
  const delimIdx = findDelimiterLine(lines);
  if (delimIdx === -1) return text;

  // Trouver le titre ### N. après le délimiteur
  const chapterRe = new RegExp('^### +' + escRe(num) + '[.\\-\\s]');
  let chapterIdx = -1;
  for (let i = delimIdx + 1; i < lines.length; i++) {
    if (chapterRe.test(lines[i])) { chapterIdx = i; break; }
  }
  if (chapterIdx === -1) return text;

  // Trouver #### Contenu — stopper sur ### (pas ####)
  let contenuIdx = -1;
  for (let i = chapterIdx + 1; i < lines.length; i++) {
    if (/^###[^#]/.test(lines[i])) break;          // prochain chapitre ### — arrêt
    if (/^#### Contenu\s*$/.test(lines[i])) { contenuIdx = i; break; }
  }
  if (contenuIdx === -1) return text;

  // Trouver la fin de #### Contenu — stopper sur #### ou ###
  let endIdx = lines.length;
  for (let i = contenuIdx + 1; i < lines.length; i++) {
    if (/^####/.test(lines[i]) || /^###[^#]/.test(lines[i])) { endIdx = i; break; }
  }

  return [
    ...lines.slice(0, contenuIdx + 1),
    ...content.split('\n'),
    ...lines.slice(endIdx),
  ].join('\n');
}

/**
 * GuideIA.md — remplace le corps du chapitre num (chapitres en ## N.).
 */
function replaceGuideContent(text, num, content) {
  const lines = text.split('\n');
  const chapterRe = new RegExp('^## +' + escRe(num) + '[.\\-\\s]');

  let chapterIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    if (chapterRe.test(lines[i])) { chapterIdx = i; break; }
  }
  if (chapterIdx === -1) return text;

  let endIdx = lines.length;
  for (let i = chapterIdx + 1; i < lines.length; i++) {
    if (/^##[^#]/.test(lines[i]) || /^#[^#]/.test(lines[i])) { endIdx = i; break; }
  }

  return [
    lines[chapterIdx],
    ...content.split('\n'),
    '',
    ...lines.slice(endIdx),
  ].join('\n');
}

/**
 * Plan.md — remplace le contenu d'un bloc figure ou encadré.
 */
function replaceElementContent(text, num, elType, id, content) {
  const lines = text.split('\n');
  const escapedId = escRe(id);
  const headRe = elType === 'figures'
    ? new RegExp('>\\s*🖼️\\s*\\*\\*figure\\*\\*\\s*`' + escapedId + '`')
    : new RegExp('>\\s*📦\\s*\\*\\*encadré\\*\\*\\s*`' + escapedId + '`');

  let headIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    if (headRe.test(lines[i])) { headIdx = i; break; }
  }
  if (headIdx === -1) return text;

  let endIdx = headIdx + 1;
  while (endIdx < lines.length) {
    const l = lines[endIdx];
    if (!/^>/.test(l) && l.trim() !== '') break;
    if (/^>/.test(l) && (/>.*🖼️.*\*\*figure\*\*/.test(l) || />.*📦.*\*\*encadré\*\*/.test(l))) break;
    endIdx++;
  }

  const contentLines = content.split('\n').map(l => l ? '> ' + l : '>');
  return [
    ...lines.slice(0, headIdx + 1),
    ...contentLines,
    ...lines.slice(endIdx),
  ].join('\n');
}

async function refresh() {
  const hasOps = S.draft && S.draft.ops && S.draft.ops.length > 0;
  if (hasOps) {
    showModal('Rafraîchir', `
      <p>Une révision est en cours. Rafraîchir abandonnera toutes les modifications non enregistrées.<br><br>Les fichiers sources ne seront pas modifiés.</p>
    `, async () => {
      S.draft = null; await api.del(PATH.draft); await load();
      toast('Fichiers rechargés'); return true;
    });
  } else {
    await load(); toast('Fichiers rechargés');
  }
}

async function load() {
  try {
    S.planText  = await api.get(PATH.plan);
    S.guideText = await api.get(PATH.guide);
  } catch(e) { setConn(false, 'Fichiers introuvables'); return; }

  let draft = null;
  try { draft = JSON.parse(await api.get(PATH.draft)); } catch {}
  S.draft = draft;

  S.metaContent  = extractMeta(S.planText);
  S.metaModified = false;

  const { chapters, edits } = buildState(S.planText, S.guideText, draft);
  S.chapters = chapters;
  S.edits    = edits;
  applyDisplayNums();

  const { planText, guideText, changed } = await autoRenumber(S.planText, S.guideText);
  if (changed) {
    S.planText  = planText;
    S.guideText = guideText;
    const rebuilt = buildState(S.planText, S.guideText, S.draft);
    S.chapters = rebuilt.chapters;
    S.edits    = rebuilt.edits;
    applyDisplayNums();
    showRenumberBadge();
  }

  S.selected = S.chapters[0] ? S.chapters[0].num : null;
  renderNav();
  renderDetail();
  updateTopbar();
}

function showRenumberBadge() {
  const el = document.getElementById('badge-renumber');
  el.style.display = 'inline';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function setConn(ok, msg) {
  S.connected = ok;
  document.getElementById('conn-dot').className = 'dot ' + (ok ? 'dot-green' : 'dot-red');
  document.getElementById('status-text').textContent = msg || (ok ? 'Connecté — ' + PROJECT : 'Déconnecté');
  updateTopbar();
}

function updateTopbar() {
  const hasOps = S.draft && S.draft.ops && S.draft.ops.length > 0;
  document.getElementById('badge-revision').style.display = hasOps ? 'inline' : 'none';
  document.getElementById('btn-save').disabled = !S.connected || !hasOps;
}

let _cb = null;
function showModal(title, body, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  _cb = cb;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => { const f = document.querySelector('#modal-body input:not([disabled]),#modal-body textarea'); if(f) f.focus(); }, 40);
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); _cb = null; }

let _tt;
function toast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show' + (err ? ' err' : '');
  clearTimeout(_tt); _tt = setTimeout(() => el.className = '', 2500);
}

document.getElementById('btn-apply-plan').onclick   = applyPlan;
document.getElementById('btn-cancel-plan').onclick  = cancelPlan;
document.getElementById('btn-apply-guide').onclick  = applyGuide;
document.getElementById('btn-cancel-guide').onclick = cancelGuide;
document.getElementById('btn-save').onclick         = save;
document.getElementById('btn-refresh').onclick      = refresh;
document.getElementById('btn-add-keyword').onclick  = () => promptAddElem('keywords');
document.getElementById('btn-add-figure').onclick   = () => promptAddElem('figures');
document.getElementById('btn-add-encadre').onclick  = () => promptAddElem('encadres');
document.getElementById('modal-confirm').onclick    = async () => { if(_cb){ const r=await _cb(); if(r!==false) closeModal(); }};
document.getElementById('modal-cancel').onclick     = closeModal;
document.getElementById('modal-overlay').onclick    = e => { if(e.target===document.getElementById('modal-overlay')) closeModal(); };

(async () => {
  const ok = await api.ping();
  setConn(ok);
  if (ok) await load();
})();
</script>
</body>
</html>
