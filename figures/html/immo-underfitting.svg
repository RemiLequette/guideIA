  <circle cx="338" cy="222" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="358" cy="199" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="371" cy="180" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="392" cy="203" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="412" cy="166" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="433" cy="152" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="454" cy="175" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="475" cy="133" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="487" cy="147" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="516" cy="110" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="537" cy="124" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="571" cy="87"  r="5" fill="#3b82f6" fill-opacity="0.75"/>

  <!-- Annotation -->
  <text class="ts" x="500" y="183" text-anchor="start" fill="#ef4444">prix moyen global</text>
  <text class="ts" x="500" y="198" text-anchor="start" fill="#ef4444">266 k€ — modèle trop simple</text>

  <!-- Légende -->
  <line x1="84"  y1="368" x2="112" y2="368" stroke="#ef4444" stroke-width="2.5"/>
  <text class="ts" x="118" y="372" fill="var(--color-text-secondary)">modèle trop simple</text>
  <line x1="270" y1="368" x2="298" y2="368" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <text class="ts" x="304" y="372" fill="var(--color-text-secondary)">modèle correct (référence)</text>

</svg>
