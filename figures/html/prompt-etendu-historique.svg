<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 340" role="img">
  <title>Structure du prompt étendu avec historique</title>
  <desc>Schéma des couches du message envoyé au modèle : prompt système, historique de la conversation (qui grossit), et dernière question.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Accolade gauche -->
  <path d="M160 40 L148 40 L148 300 L160 300" fill="none" stroke="#9ca3af" stroke-width="1.2"/>
  <text class="ts" x="60" y="174" text-anchor="middle" fill="var(--color-text-secondary)">envoyé au</text>
  <text class="ts" x="60" y="190" text-anchor="middle" fill="var(--color-text-secondary)">modèle</text>

  <!-- Bloc 1 : Prompt système -->
  <g class="c-teal">
    <rect x="165" y="40" width="340" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="335" y="66" text-anchor="middle" dominant-baseline="central">Prompt système</text>
  </g>

  <!-- Bloc 2 : Historique -->
  <g class="c-gray">
    <rect x="165" y="100" width="340" height="148" rx="8" stroke-width="0.5"/>
    <text class="th" x="335" y="162" text-anchor="middle" dominant-baseline="central">Historique de la conversation</text>
    <text class="ts" x="335" y="184" text-anchor="middle" dominant-baseline="central">échanges précédents</text>
  </g>

  <!-- Bloc 3 : Dernière question -->
  <g class="c-purple">
    <rect x="165" y="256" width="340" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="335" y="278" text-anchor="middle" dominant-baseline="central">Dernière question</text>
  </g>

  <!-- Annotation croissance -->
  <line x1="526" y1="100" x2="526" y2="248" stroke="#f97316" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" fill="none"/>
  <text class="ts" x="560" y="162" text-anchor="start" fill="#f97316">grossit à</text>
  <text class="ts" x="560" y="178" text-anchor="start" fill="#f97316">chaque</text>
  <text class="ts" x="560" y="194" text-anchor="start" fill="#f97316">échange</text>

</svg>
