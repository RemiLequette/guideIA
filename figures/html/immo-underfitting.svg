<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 400" role="img">
  <title>Modèle immobilier — underfitting</title>
  <desc>Modèle trop simple : droite horizontale qui ne capture pas la tendance des données.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="80" y1="320" x2="632" y2="320" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="80" y1="320" x2="80"  y2="28"  stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="638" y="324" text-anchor="start" fill="var(--color-text-secondary)">surface (m²)</text>
  <text class="ts" x="76"  y="22"  text-anchor="end"   fill="var(--color-text-secondary)">prix (k€)</text>

  <!-- Graduations X -->
  <line x1="80"  y1="318" x2="80"  y2="324" stroke="#374151" stroke-width="1"/>
  <text class="ts" x="80"  y="334" text-anchor="middle" fill="var(--color-text-secondary)">0</text>
  <line x1="163" y1="318" x2="163" y2="324" stroke="#374151" stroke-width="1"/>
  <text class="ts" x="163" y="334" text-anchor="middle" fill="var(--color-text-secondary)">20</text>
  <line x1="247" y1="318" x2="247" y2="324" stroke="#374151" stroke-width="1"/>
  <text class="ts" x="247" y="334" text-anchor="middle" fill="var(--color-text-secondary)">40</text>
  <line x1="330" y1="318" x2="330" y2="324" stroke="#374151" stroke-width="1"/>
  <text class="ts" x="330" y="334" text-anchor="middle" fill="var(--color-text-secondary)">60</text>
  <line x1="414" y1="318" x2="414" y2="324" stroke="#374151" stroke-width="1"/>
  <text class="ts" x="414" y="334" text-anchor="middle" fill="var(--color-text-secondary)">80</text>
  <line x1="497" y1="318" x2="497" y2="324" stroke="#374151" stroke-width="1"/>
  <text class="ts" x="497" y="334" text-anchor="middle" fill="var(--color-text-secondary)">100</text>
  <line x1="581" y1="318" x2="581" y2="324" stroke="#374151" stroke-width="1"/>
  <text class="ts" x="581" y="334" text-anchor="middle" fill="var(--color-text-secondary)">120</text>

  <!-- Graduations Y -->
  <line x1="78" y1="320" x2="84" y2="320" stroke="#374151" stroke-width="1"/>
  <text class="ts" x="74" y="324" text-anchor="end" fill="var(--color-text-secondary)">0</text>
  <line x1="78" y1="273" x2="84" y2="273" stroke="#374151" stroke-width="1"/>
  <text class="ts" x="74" y="277" text-anchor="end" fill="var(--color-text-secondary)">100</text>
  <line x1="78" y1="227" x2="84" y2="227" stroke="#374151" stroke-width="1"/>
  <text class="ts" x="74" y="231" text-anchor="end" fill="var(--color-text-secondary)">200</text>
  <line x1="78" y1="180" x2="84" y2="180" stroke="#374151" stroke-width="1"/>
  <text class="ts" x="74" y="184" text-anchor="end" fill="var(--color-text-secondary)">300</text>
  <line x1="78" y1="133" x2="84" y2="133" stroke="#374151" stroke-width="1"/>
  <text class="ts" x="74" y="137" text-anchor="end" fill="var(--color-text-secondary)">400</text>
  <line x1="78" y1="87"  x2="84" y2="87"  stroke="#374151" stroke-width="1"/>
  <text class="ts" x="74" y="91"  text-anchor="end" fill="var(--color-text-secondary)">500</text>

  <!-- Droite correcte en tirets -->
  <line x1="80" y1="320" x2="620" y2="86" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.35"/>
  <!-- Modèle trop simple : prix moyen global 266 k€ -->
  <line x1="80" y1="196" x2="620" y2="196" stroke="#ef4444" stroke-width="2.5"/>

  <!-- Points -->
  <circle cx="163" cy="287" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="196" cy="280" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="213" cy="259" r="5" fill="#3b82f6" fill-opacity="0.75"/>
  <circle cx="238" cy="269" r="5" fill="#3b82f6" fill-opacity="0.75"/>
