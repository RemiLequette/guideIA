<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 280" role="img">
  <title>Flux entre l'humain, l'orchestrateur et le modèle</title>
  <desc>Diagramme montrant le flux aller (prompt) et retour (réponse) entre l'humain, l'orchestrateur et le modèle de langage.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Humain -->
  <g class="c-gray">
    <rect x="40" y="116" width="140" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="140" text-anchor="middle" dominant-baseline="central">Humain</text>
  </g>

  <!-- Orchestrateur -->
  <g class="c-teal">
    <rect x="270" y="116" width="140" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central">Orchestrateur</text>
  </g>

  <!-- Modèle / LLM -->
  <g class="c-purple">
    <rect x="500" y="116" width="140" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="570" y="133" text-anchor="middle" dominant-baseline="central">Modèle</text>
    <text class="ts" x="570" y="152" text-anchor="middle" dominant-baseline="central">LLM</text>
  </g>

  <!-- Flèche aller : Humain → Orchestrateur -->
  <line x1="182" y1="128" x2="268" y2="128" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <text class="ts" x="225" y="118" text-anchor="middle" fill="var(--color-text-secondary)">prompt</text>

  <!-- Flèche retour : Orchestrateur → Humain -->
  <line x1="268" y1="152" x2="182" y2="152" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <text class="ts" x="225" y="170" text-anchor="middle" fill="var(--color-text-secondary)">réponse</text>

  <!-- Flèche aller : Orchestrateur → Modèle -->
  <line x1="412" y1="128" x2="498" y2="128" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <text class="ts" x="455" y="118" text-anchor="middle" fill="var(--color-text-secondary)">prompt</text>

  <!-- Flèche retour : Modèle → Orchestrateur -->
  <line x1="498" y1="152" x2="412" y2="152" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <text class="ts" x="455" y="170" text-anchor="middle" fill="var(--color-text-secondary)">complétion</text>

</svg>
